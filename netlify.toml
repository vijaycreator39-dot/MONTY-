[build]
  base = "frontend"
  command = "yarn install --frozen-lockfile=false && yarn build"
  publish = "build"

[build.environment]
  NODE_VERSION = "20"
  CI = "false"
  REACT_APP_BACKEND_URL = ""

# SPA fallback so React Router works on Netlify
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache static assets aggressively
[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
